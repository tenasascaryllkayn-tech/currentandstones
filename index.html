<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currents & Stones</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .entrance-container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }
    .page-title {
      font-size: 2em;
      font-weight: bold;
      color: #1d3557;
      margin-bottom: 20px;
    }
    .wave-icon {
      font-size: 60px;
      color: #0077b6;
    }
    .persistence-quote {
      font-style: italic;
      margin: 20px 0;
      font-size: 1.2em;
      color: #1d3557;
    }
    .author {
      font-size: 1em;
      color: #457b9d;
      margin-top: 10px;
    }
    .stone-button {
      display: inline-block;
      text-decoration: none;
      font-size: 50px; /* stone emoji size */
      margin-top: 20px;
      transition: transform 0.3s;
    }
    .stone-button:hover {
      transform: scale(1.2);
    }
    .stone-button p {
      margin-top: 6px;
      font-size: 0.8em; /* smaller text */
      color: #1d3557;
    }
  </style>
</head>
<body>

  <main class="entrance-container">
    <div class="page-title">Currents & Stones</div>

    <div class="wave-icon">🌊</div>

    <blockquote class="persistence-quote">
      "A river cuts through rock, not because of its power, but because of its persistence."
    </blockquote>
    <div class="author">— James N. Watkins</div>

    <a href="dashboard.html" class="stone-button">
     🗿
      <p>TAP THE ROCK TO CONTINUE</p>
    </a>
  </main>

</body>
</html>
