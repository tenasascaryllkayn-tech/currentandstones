<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currents & Stones</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #cce7ff, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .entrance-container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }
    .wave-icon {
      font-size: 60px;
      color: #0077b6;
    }
    .persistence-quote {
      font-style: italic;
      margin: 20px 0;
      font-size: 1.2em;
      color: #333;
    }
    .stone-button {
      display: inline-block;
      text-decoration: none;
      background: #555;
      color: white;
      padding: 20px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .stone-button:hover {
      background: #333;
    }
    .stone-button p {
      margin: 10px 0 0;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <main class="entrance-container">
    <div class="wave-icon">🌊</div>

    <blockquote class="persistence-quote">
      "A river cuts through rock, not because of its power, but because of its persistence."
      <br>— James N. Watkins
    </blockquote>

    <a href="dashboard.html" class="stone-button">
  <div class="stone-shape"></div>
  <p>TAP THE STONE TO CONTINUE</p>
</a>

<style>
  .stone-button {
    display: inline-block;
    text-decoration: none;
    text-align: center;
    margin-top: 20px;
  }
  .stone-shape {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at 30% 30%, #6d6875, #3d3d3d);
    border-radius: 50%;
    box-shadow: inset -4px -4px 8px rgba(255,255,255,0.2),
                inset 4px 4px 8px rgba(0,0,0,0.4),
                0 6px 12px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
    margin: 0 auto;
  }
  .stone-shape:hover {
    transform: scale(1.1);
    box-shadow: inset -4px -4px 8px rgba(255,255,255,0.3),
                inset 4px 4px 8px rgba(0,0,0,0.5),
                0 8px 16px rgba(0,0,0,0.4);
  }
  .stone-button p {
    margin-top: 10px;
    font-size: 0.9em;
    color: #1d3557;
  }
</style>

  </main>

</body>
</html>
