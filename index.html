<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currents & Stones</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #cce7ff, #ffffff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .entrance-container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }
    .wave-icon {
      font-size: 60px;
      color: #0077b6;
    }
    .persistence-quote {
      font-style: italic;
      margin: 20px 0;
      font-size: 1.2em;
      color: #333;
    }
    .stone-button {
      display: inline-block;
      text-decoration: none;
      background: #555;
      color: white;
      padding: 20px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .stone-button:hover {
      background: #333;
    }
    .stone-button p {
      margin: 10px 0 0;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <main class="entrance-container">
    <div class="wave-icon">🌊</div>

    <blockquote class="persistence-quote">
      "A river cuts through rock, not because of its power, but because of its persistence."
      <br>— James N. Watkins
    </blockquote>

    <a href="dashboard.html" class="stone-button">
      🪨
      <p>TAP THE WAVE TO CONTINUE</p>
    </a>
  </main>

</body>
</html>
